<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ရခိုင်အနုပညာမှတ်တမ်း</title>
    <link rel="stylesheet" href="AAA_style.css">
</head>
<body class="light-mode">

    <nav>
        <strong>Rakhine Archive</strong>
        <button onclick="document.body.classList.toggle('dark-mode')">🌙/☀️</button>
    </nav>
    
<div class="container">
    <div id="master-panel">
        <input type="text" id="search" class="search-box" placeholder="ရှာဖွေရန်..." onkeyup="filterData()">
        <div id="loading" class="loading">ဒေတာများ ဆွဲယူနေပါသည်...</div>
        <div id="artist-list-container"></div> 
    </div>

    <div id="group-list">
        <div style="padding: 20px; text-align: center; color: #888;">
            <p>ကြည့်ရှုလိုသည့် အဆိုတော်ကို ဘယ်ဘက်မှ ရွေးချယ်ပါ။</p>
        </div>
    </div>
</div>

    <div id="overlay" class="menu-overlay" onclick="toggleSortMenu(false)"></div>

    <div id="sortMenu" class="sort-menu">
        <button class="sort-item" onclick="handleSort('artist')">👥 တေးဆို</button>
        <button class="sort-item" onclick="handleSort('writer')">✍️ တေးရွီး</button>
        <button class="sort-item" onclick="handleSort('album')">💿 အယ်ဘမ်</button>
        <button class="sort-item" onclick="handleSort('oc')">🎸 O / C</button>
        <button class="sort-item" onclick="handleSort('tradition')">🌸 သင်္ကြန်/ရိုးရာ</button>
        <button class="sort-item" onclick="toggleSortOrder()" id="orderBtn">🔡 က - အ</button>
    </div>
<div id="fullModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modal-body">
            </div>
    </div>
</div>

    <div class="bottom-toolbar">
        <button id="backBtn" class="tool-btn" onclick="goBackToGroup()" style="display:none; color: #cf0000;">
            <span class="icon">⬅️</span>
            <span>ပြန်ထွက်ရန်</span>
        </button>
        <button id="sortBtn" class="tool-btn" onclick="toggleSortMenu()">
            <span class="icon">🔃</span>
            <span>စီနည်း</span>
        </button>
        <button class="tool-btn" onclick="location.reload()">
            <span class="icon">🔄</span>
            <span>Update</span>
        </button>
    </div>

    <script src="AAA_script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Vault Table</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f4f8; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        /* Table Scroll CSS */
        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; min-width: 120px; }
        th { background-color: #007bff; color: white; white-space: nowrap; }
        
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px 0; font-size: 14px; }
        .btn-blue { background: #007bff; color: white; }
        .btn-green { background: #28a745; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        #list-page, #token-tool-section { display: none; }
        #status { font-size: 13px; text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-page" class="box" style="max-width: 450px;">
    <h2 style="text-align:center;">Vault Login</h2>
    <input type="password" id="p1" placeholder="💖လှ ဝင်း💖">
    <input type="password" id="p2" placeholder="MPY ">
    <input type="password" id="p3" placeholder="MName ">
    <input type="password" id="p4" placeholder="MID">
    <input type="password" id="p5" placeholder="ANNAME">
    <button class="btn btn-blue" style="width:100%" onclick="unlock()">Unlock & Sync</button>
    <button class="btn btn-gray" style="width:100%; margin-top:20px; font-size:11px;" onclick="toggleTokenTool()">🛠️ Tool</button>
    <div id="token-tool-section" style="background:#f9f9f9; padding:15px; border-radius:10px; margin-top:10px; border: 1px dashed #ccc;">
        <input type="text" id="rawToken" placeholder="GitHub Token">
        <input type="text" id="rawPass" placeholder="5Pass">
        <button class="btn btn-green" style="width:100%" onclick="generateEncryptedToken()">Generate</button>
        <textarea id="tokenResult" rows="3" readonly style="width:100%; margin-top:10px; font-size:12px;"></textarea>
    </div>
</div>

<div id="list-page" class="box">
    <h2 style="margin-top:0;">Flexible Data Table</h2>
    
    <div class="table-container">
        <table id="mainTable">
            <thead id="tableHead">
                <tr>
                    <th>ID</th>
                    <th>Name </th>
                    <th>Mail </th>
                    <th style="min-width:50px;">Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    
    <div class="btn-group">
        <button class="btn btn-green" onclick="addRow()">🔽 Row </button>
        <button class="btn btn-blue" onclick="addColumn()">▶️ Column </button>
        <button class="btn btn-blue" style="background:#17a2b8;" onclick="saveToGitHub()">Cloud Sync (သိမ်းမည်)</button>
    </div>

    <div id="status"></div>
    <button class="btn btn-red" onclick="location.reload()" style="margin-top:20px; width:100px;">Logout</button>
</div>

<script>
    const ENCRYPTED_TOKEN = 'U2FsdGVkX18L3QmAwQ5/34Dt9UW72Ni9dkwtvVSZKogQeoPRvIgFH5d9L0g73hAluZPluIG/JTgeu815BVZBwA=='; 
    const USER = 'arakanartarea';
    const REPO = 'AAA-NotePL';
    const FILE = 'data.txt';
    
    let masterKey = "";
    let realToken = "";
    let fileSHA = "";

    // Column အသစ်တိုးရန်
    function addColumn(title = "အသစ်") {
        const thead = document.querySelector('#tableHead tr');
        const rows = document.querySelectorAll('#tableBody tr');
        
        // Header မှာ ကော်လံတိုး (Action column ရဲ့ အရှေ့မှာ ထည့်မယ်)
        const th = document.createElement('th');
        th.contentEditable = true; // ကော်လံခေါင်းစဉ်ကို ပြင်လို့ရအောင်
        th.innerText = title;
        thead.insertBefore(th, thead.children[thead.children.length - 1]);

        // ရှိပြီးသား Row တွေမှာ အကွက်အသစ်တွေလိုက်ထည့်
        rows.forEach(row => {
            const td = row.insertCell(row.cells.length - 1);
            td.innerHTML = `<input type="text" class="t-cell">`;
        });
    }

    // Row အသစ်တိုးရန်
    function addRow(dataArray = null) {
        const tbody = document.getElementById('tableBody');
        const colCount = document.querySelector('#tableHead tr').children.length;
        const row = tbody.insertRow();

        for (let i = 0; i < colCount - 1; i++) {
            const td = row.insertCell();
            const val = dataArray ? (dataArray[i] || "") : "";
            td.innerHTML = `<input type="text" class="t-cell" value="${val}">`;
        }
        
        // ဖျက်တဲ့ခလုတ်
        const actionTd = row.insertCell();
        actionTd.innerHTML = `<button class="btn btn-red" onclick="this.parentElement.parentElement.remove()" style="padding:2px 8px;">X</button>`;
    }

    async function unlock() {
        masterKey = ["p1","p2","p3","p4","p5"].map(id => document.getElementById(id).value).join('');

        try {
            const bytes = CryptoJS.AES.decrypt(ENCRYPTED_TOKEN, masterKey);
            realToken = bytes.toString(CryptoJS.enc.Utf8);
            if (!realToken.startsWith('ghp_')) throw new Error();

            const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                headers: { 'Authorization': `token ${realToken}` }
            });
            const data = await response.json();
            fileSHA = data.sha;
            const encryptedContent = atob(data.content).trim();

            if (encryptedContent !== "initial" && encryptedContent !== "") {
                const contentBytes = CryptoJS.AES.decrypt(encryptedContent, masterKey);
                const fullData = JSON.parse(contentBytes.toString(CryptoJS.enc.Utf8));
                
                // ၁။ Header ကို အရင်တည်ဆောက်မယ်
                const headerRow = document.querySelector('#tableHead tr');
                headerRow.innerHTML = "";
                fullData.headers.forEach(h => {
                    const th = document.createElement('th');
                    th.contentEditable = true;
                    th.innerText = h;
                    headerRow.appendChild(th);
                });
                const actionTh = document.createElement('th');
                actionTh.innerText = "Action";
                headerRow.appendChild(actionTh);

                // ၂။ ဒေတာတွေကို ထည့်မယ်
                document.getElementById('tableBody').innerHTML = "";
                fullData.rows.forEach(r => addRow(r));
            } else {
                addRow();
            }
            
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('list-page').style.display = 'block';
        } catch (e) { alert("ဝင်ရောက်ရန် မအောင်မြင်ပါ"); }
    }

    async function saveToGitHub() {
        const status = document.getElementById('status');
        status.innerText = "Syncing...";
        
        // Headers စုဆောင်းမယ်
        const headers = [];
        document.querySelectorAll('#tableHead th').forEach((th, index, arr) => {
            if (index < arr.length - 1) headers.push(th.innerText);
        });

        // Rows စုဆောင်းမယ်
        const rowsData = [];
        document.querySelectorAll('#tableBody tr').forEach(row => {
            const rowCells = [];
            row.querySelectorAll('.t-cell').forEach(input => rowCells.push(input.value));
            rowsData.push(rowCells);
        });

        const finalJSON = JSON.stringify({ headers: headers, rows: rowsData });
        const encrypted = CryptoJS.AES.encrypt(finalJSON, masterKey).toString();

        try {
            const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${realToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Sync Flex Table", content: btoa(encrypted), sha: fileSHA })
            });
            const resData = await response.json();
            fileSHA = resData.content.sha;
            status.innerText = "အောင်မြင်စွာ သိမ်းဆည်းပြီးပါပြီ။";
            status.style.color = "green";
        } catch (e) { status.innerText = "Sync မအောင်မြင်ပါ"; status.style.color = "red"; }
    }

    function toggleTokenTool() {
        const t = document.getElementById('token-tool-section');
        t.style.display = t.style.display === 'none' ? 'block' : 'none';
    }

    function generateEncryptedToken() {
        const t = document.getElementById('rawToken').value;
        const p = document.getElementById('rawPass').value;
        document.getElementById('tokenResult').value = CryptoJS.AES.encrypt(t, p).toString();
    }
</script>
</body>
</html>

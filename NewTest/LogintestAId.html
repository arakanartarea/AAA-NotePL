<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arakanese Dictionary - Auth Test</title>
    <style>
        body { font-family: sans-serif; background-color: #f5f0db; padding: 20px; text-align: center; }
        .auth-container { display: inline-block; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .profile-img { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 2px solid #795548; object-fit: cover; }
        .login-btn { font-size: 30px; cursor: pointer; background: none; border: none; }
        .dropdown { display: none; position: absolute; background: white; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border-radius: 4px; padding: 10px; z-index: 100; }
        .dropdown button { display: block; width: 100%; padding: 8px; margin: 5px 0; cursor: pointer; background: #795548; color: white; border: none; border-radius: 4px; }
        .status-box { margin-top: 20px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div id="authArea">
            <button id="loginBtn" class="login-btn">👤</button>
        </div>
        
        <div id="accountMenu" class="dropdown">
            <button id="logoutBtn">အကောင့်ထွက်ရန်</button>
            <button id="changeAccBtn">အကောင့်ပြောင်းရန်</button>
        </div>

        <div id="status" class="status-box">အကောင့်မဝင်ရသေးပါ</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, signInWithRedirect, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // TODO: ကိုယ့် Firebase Config အချက်အလက်တွေကို ဒီမှာ အစားထိုးပါ
        const firebaseConfig = {
    apiKey: "AIzaSyC7N9_TNTp_aThC_olEDyMcEo2pAhOFEGI",
    authDomain: "arakanese-dictionary.firebaseapp.com",
    projectId: "arakanese-dictionary",
    storageBucket: "arakanese-dictionary.firebasestorage.app",
    messagingSenderId: "955711906003",
    appId: "1:955711906003:web:6d9b60bd4cdaa8a8953426"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const authArea = document.getElementById('authArea');
        const loginBtn = document.getElementById('loginBtn');
        const accountMenu = document.getElementById('accountMenu');
        const logoutBtn = document.getElementById('logoutBtn');
        const changeAccBtn = document.getElementById('changeAccBtn');
        const statusDiv = document.getElementById('status');

        // ၁။ ထူးခြားတဲ့ AID (A-0000001 မှ A-9999999) ကို Auto ထုတ်ပေးမည့် Logic
        async function generateUniqueAID() {
            const querySnapshot = await getDocs(collection(db, "AllUserList"));
            let existingAids = [];
            querySnapshot.forEach((doc) => {
                if(doc.data().AID) existingAids.push(doc.data().AID);
            });

            for (let i = 1; i <= 9999999; i++) {
                let formattedAid = `A-${String(i).padStart(7, '0')}`;
                if (!existingAids.includes(formattedAid)) {
                    return formattedAid; // မရှိသေးတဲ့ AID အလွတ်ကို ပေးမယ်
                }
            }
            return "A-9999999"; 
        }

        // ၂။ ပြက္ခဒိန်နှစ် နန့် လ ကို ရယူခြင်း
        const currentYear = new Date().getFullYear().toString();
        const currentMonth = (new Date().getMonth() + 1).toString().padStart(2, '0');

        // ၃။ Auth အခြေအနေ စောင့်ကြည့်စစ်ဆေးခြင်း
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const uid = user.uid; // Google ID (UID/GID)
                localStorage.setItem('current_gid', uid); // GID ကို local သို့ပို့

                statusDiv.innerText = "ဒေတာဘေ့စ် စစ်ဆေးနေပါသည်...";
                const userDocRef = doc(db, "AllUserList", uid);
                const userDoc = await getDoc(userDocRef);

                if (!userDoc.exists()) {
                    // အကောင့်သစ်ဆိုရင် AID အသစ်ထုတ်ပြီး ဒေတာလှမ်းသိမ်းမယ်
                    const newAID = await generateUniqueAID();
                    const userData = {
                        Year: currentYear,
                        Month: currentMonth,
                        AID: newAID,
                        GID: uid, // UID ကိုပါ သိမ်းဆည်းခြင်း
                        Name: user.displayName || "Unknown",
                        Acc: user.email,
                        Time: new Date().toISOString(), // ms ပါတဲ့ ဂလိုဘယ်တိုင်း (ISO String)
                        Role: "Viewer", // Default ရာထူး
                        createdAt: new Date()
                    };
                    await setDoc(userDocRef, userData);
                    statusDiv.innerText = `အကောင့်သစ် ဖွင့်ပြီးပါပြီ။ GID ကို Local သို့ ပို့ထားပါသည်။ (AID: ${newAID})`;
                } else {
                    statusDiv.innerText = `ရှိပြီးသားအကောင့်ဖြစ်ပါသည်။ GID ကို Local သို့ ပို့ထားပါသည်။ (AID: ${userDoc.data().AID})`;
                }

                // UI ကို Profile ပုံ ပြောင်းလဲခြင်း
                authArea.innerHTML = `<img src="${user.photoURL || '👤'}" class="profile-img" id="profileBtn">`;
                document.getElementById('profileBtn').addEventListener('click', (e) => {
                    accountMenu.style.display = accountMenu.style.display === 'block' ? 'none' : 'block';
                    e.stopPropagation();
                });

            } else {
                // အကောင့်မရှိရင် UI ကို ဗလာပြန်လုပ်မယ်
                localStorage.removeItem('current_gid');
                authArea.innerHTML = `<button id="loginBtn" class="login-btn">👤</button>`;
                document.getElementById('loginBtn').addEventListener('click', doLogin);
                statusDiv.innerText = "အကောင့်မဝင်ရသေးပါ";
                accountMenu.style.display = 'none';
            }
        });

        // ၄။ Login ဝင်ခြင်း လုပ်ဆောင်ချက်
      /*  async function doLogin() {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login Error: ", error);
                alert("Login ဝင်လို့မရပါ");
            }
        } */
        // အပေါ်က import မှာ signInWithRedirect ကိုပါ ထည့်ပေးပါ

async function doLogin() {
    try {
        // Pop-up အစား Redirect ပုံစံပြောင်းလဲခြင်း
        await signInWithRedirect(auth, provider);
    } catch (error) {
        console.error("Login Error: ", error);
        alert("Login ဝင်လို့မရပါ- " + error.message);
    }
}


        // ၅။ အကောင့်ထွက်ခြင်း
        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });

        // ၆။ အကောင့်ပြောင်းခြင်း (Prompt ပြန်ပြပြီး ရွေးခိုင်းခြင်း)
        changeAccBtn.addEventListener('click', async () => {
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error(error);
            }
        });

        // ပြင်ပနေရာနှိပ်ရင် Menu ပိတ်ရန်
        window.addEventListener('click', () => { accountMenu.style.display = 'none'; });
    </script>
</body>
</html>

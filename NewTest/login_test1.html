<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- GitHub Pages Cache အကုန်ပိတ် -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>Always Fresh App</title>
  
  <style>
    /* CSS အကုန် ဒီမှာပေါင်းရေး */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    
    /* TextView - Version ပြမယ့်နေရာ */
    #textView {
      font-size: 18px;
      margin: 20px 0;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
    }
    #js-version {
      color: #4ade80;
      font-weight: bold;
      font-size: 24px;
      display: block;
      margin-top: 8px;
    }
    #load-time {
      font-size: 14px;
      opacity: 0.8;
      margin-top: 10px;
    }
    
    /* Image Button - အဝိုင်းလူပုံ */
    #image-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid white;
      cursor: pointer;
      transition: transform 0.2s;
      object-fit: cover;
      margin: 20px 0;
    }
    #image-btn:active {
      transform: scale(0.95);
    }
    
    .status {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub Pages Uptime Test</h1>
    
    <!-- TextView -->
    <div id="textView">
      JS Version:
      <span id="js-version">Loading...</span>
      <div id="load-time"></div>
    </div>
    
    <!-- Image Button - အဝိုင်းလူပုံ -->
    <img id="image-btn" 
         src="https://i.pravatar.cc/200" 
         alt="User Avatar">
    
    <div class="status">Page ဖွင့်တိုင်း JS အသစ်ပဲ</div>
  </div>

  <script>
    // ===== JS အကုန် ဒီမှာပေါင်းရေး =====
    
    // 1. ဒီ VERSION ကို ပြင်မှ Version ပြောင်းမယ် - အစစ်ပဲ
    const APP_VERSION = 'v1.0.3';
    
    // 2. Page Load Time + Version ပြမယ်
    function initApp() {
      document.getElementById('js-version').innerText = APP_VERSION;
      document.getElementById('load-time').innerText = 
        'Loaded: ' + new Date().toLocaleString();
      
      console.log('App Version:', APP_VERSION);
      console.log('Cache Bust:', new Date().getTime());
    }
    
    // 3. Image Button နှိပ်ရင်
    document.getElementById('image-btn').addEventListener('click', () => {
      alert('JS Version: ' + APP_VERSION + '\nTimestamp: ' + new Date().getTime());
    });
    
    // 4. GitHub Pages Cache Bust: HTML ကိုယ်တိုင်ကို Query နဲ့ခေါ်ခိုင်းတာ
    // URL မှာ ?t= မပါရင် auto reload လုပ်
    if (!window.location.search.includes('t=')) {
      const timestamp = new Date().getTime();
      window.location.href = window.location.pathname + '?t=' + timestamp;
    } else {
      // Query ပါလာပြီဆိုမှ App စ Run
      initApp();
    }
  </script>
</body>
</html>

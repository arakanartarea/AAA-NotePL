<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Cache 100% ပိတ် -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <title>Fresh App</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #1a1a1a; color: white;
    }
    .container { text-align: center; padding: 30px; }
    #textView { 
      font-size: 18px; margin: 20px 0; 
      padding: 15px; background: #333; border-radius: 10px; 
    }
    #js-version { color: #4ade80; font-weight: bold; font-size: 24px; }
    #image-btn {
      width: 100px; height: 100px; border-radius: 50%;
      border: 3px solid #4ade80; cursor: pointer; object-fit: cover;
    }
  </style>
  
  <!-- Firebase SDK - module မသုံးပဲ CDN နဲ့ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="container">
    <h2>Google Login Test</h2>
    
    <div id="textView">
      JS Version: <span id="js-version">Loading...</span>
    </div>
    
    <!-- ပုံသေ အပြာရောင်လူပုံ -->
    <img id="image-btn" 
         src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234285f4'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" 
         alt="Login">
  </div>

  <script>
    // 1. Version အစစ် - ဒီကိုပြင်မှ ပြောင်းမယ်
    const APP_VERSION = 'v1.0.7';
    
    // 2. Firebase Config - ကိုကို့ဟာထည့်
    const firebaseConfig = {
  apiKey: "AIzaSyC7N9_TNTp_aThC_olEDyMcEo2pAhOFEGI",
  authDomain: "arakanese-dictionary.firebaseapp.com",
  projectId: "arakanese-dictionary",
  storageBucket: "arakanese-dictionary.firebasestorage.app",
  messagingSenderId: "955711906003",
  appId: "1:955711906003:web:6d9b60bd4cdaa8a8953426"
};
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    
    // 3. GitHub Pages Cache Killer + Version ပြမယ်
    function init() {
      document.getElementById('js-version').innerText = APP_VERSION;
      
      // Login ဝင်ပြီးသားလား စစ်
      auth.onAuthStateChanged((user) => {
        if (user) {
          // အကောင့်ရှိရင် ပုံပြောင်း + Data သိမ်း
          document.getElementById('image-btn').src = user.photoURL || '';
          localStorage.setItem('GID', user.uid);
          localStorage.setItem('Name', user.displayName);
          localStorage.setItem('Email', user.email);
          localStorage.setItem('Photo', user.photoURL);
          localStorage.setItem('LoginTime', new Date().toLocaleString());
          localStorage.setItem('Provider', 'Google');
          document.getElementById('textView').innerHTML += '<br>Login: ' + user.displayName;
        }
      });
      
      // ပုံနှိပ်ရင် Login ခေါ်
      document.getElementById('image-btn').addEventListener('click', () => {
        auth.signInWithRedirect(provider);
      });
    }
    
    // 4. URL မှာ timestamp မပါရင် ထည့်ပြီး Reload - 100% Cache မိမှာ မဟုတ်
    if (!location.search.includes('t=')) {
      location.href = location.pathname + '?t=' + Date.now();
    } else {
      init(); // Timestamp ပါမှ App စ Run
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<body>
  <button id="imageBtn">Image Button</button>
  <div id="screen" style="margin-top:20px;">
    <img id="userPhoto" style="width:60px; border-radius:50%; display:none;">
    <span id="userName"></span>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
<script>
  // 1. ဒီ 3 ကြောင်းကို Firebase Console ကကူးဖြည့်ပါ
  const firebaseConfig = {
  apiKey: "AIzaSyC7N9_TNTp_aThC_olEDyMcEo2pAhOFEGI",
  authDomain: "arakanese-dictionary.firebaseapp.com",
  projectId: "arakanese-dictionary",
  storageBucket: "arakanese-dictionary.firebasestorage.app",
  messagingSenderId: "955711906003",
  appId: "1:955711906003:web:6d9b60bd4cdaa8a8953426"
};
  
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  const btn = document.getElementById('imageBtn');
  const photo = document.getElementById('userPhoto');
  const nameSpan = document.getElementById('userName');

  // 2. ခလုတ်နှိပ် → အကောင့်ရှိမရှိစစ်
  btn.onclick = () => {
    if (auth.currentUser) {
      // ရှိရင် ထွက်/ပြောင်း
      auth.signOut();
    } else {
      // မရှိရင် အကောင့်list ခေါ်ပြ
      auth.signInWithPopup(provider).catch(err => console.log(err));
    }
  };

  // 3. အကောင့်ရွေးပေးရင် ဒီမှာဖမ်းတယ်
  auth.onAuthStateChanged((user) => {
    if (user) {
      // ဖိုင်မှာ သွားစစ် မရှိရင်သိမ်း
      if (!localStorage.getItem('GID')) {
        localStorage.setItem('GID', user.uid);
        localStorage.setItem('Name', user.displayName);
        localStorage.setItem('Email', user.email);
        localStorage.setItem('Photo', user.photoURL);
        localStorage.setItem('LoginTime', new Date().toLocaleString());
        localStorage.setItem('Provider', 'Google');
      }
      // အကောင့်ကို localမှာ သိမ်း + Screen မှာပြ
      photo.src = user.photoURL;
      photo.style.display = 'block';
      nameSpan.innerText = user.displayName;
      btn.innerText = 'ထွက်/အကောင့်ပြောင်း';
    } else {
      // မရှိရင်မသိမ်း + ရှင်း
      localStorage.clear();
      photo.style.display = 'none';
      nameSpan.innerText = '';
      btn.innerText = 'Image Button';
    }
  });

  // 4. Page ပြန်ဖွင့်ရင် Local ထဲက ပြန်ပြ
  window.onload = () => {
    const savedPhoto = localStorage.getItem('Photo');
    const savedName = localStorage.getItem('Name');
    if (savedPhoto) {
      photo.src = savedPhoto;
      photo.style.display = 'block';
      nameSpan.innerText = savedName;
      btn.innerText = 'ထွက်/အကောင့်ပြောင်း';
    }
  };
</script>
</body>
</html>

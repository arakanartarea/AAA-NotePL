<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            font-family: sans-serif;
        }
        #google-login-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #status {
            margin-top: 20px;
            text-align: center;
            color: #605639;
        }
    </style>
</head>
<body>

    <div>
        <button id="google-login-btn">Google နဲ့ဝင်မယ်</button>
        <div id="status"></div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyC7N9_TNTp_aThC_olEDyMcEo2pAhOFEGI",
    authDomain: "arakanese-dictionary.firebaseapp.com",
    projectId: "arakanese-dictionary",
    storageBucket: "arakanese-dictionary.firebasestorage.app",
    messagingSenderId: "955711906003",
    appId: "1:955711906003:web:6d9b60bd4cdaa8a8953426"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById('google-login-btn');
const statusDiv = document.getElementById('status');

// ၁။ ခလုတ်နှိပ်ရင် Redirect နဲ့ဝင်
loginBtn.addEventListener('click', () => {
    statusDiv.innerText = "Google စာမျက်နှာကို ပို့နေပါတယ်...";
    signInWithRedirect(auth, provider);
});

// ၂။ Redirect ပြန်လာတဲ့အချိန် ရလဒ်ဖမ်း
getRedirectResult(auth).then(async (result) => {
    if (result) {
        // ဒီအပိုင်းက onAuthStateChanged ထဲမှာလုပ်ပြီးသားမို့ ဘာမှထပ်မလုပ်ဘူး
        console.log("Redirect ကနေပြန်လာပြီ");
    }
}).catch((error) => {
    statusDiv.innerText = "Login မအောင်မြင်ပါ: " + error.code;
    console.error(error);
});

// ၃။ Login အခြေအနေ စောင့်ကြည့်
onAuthStateChanged(auth, async (user) => {
    if (user) {
        statusDiv.innerText = "အကောင့်စစ်နေပါတယ်...";
        loginBtn.innerText = "ထွက်မယ်";
        loginBtn.onclick = () => signOut(auth);

        // AllUserList ထဲရှိမရှိစစ်
        const q = query(collection(db, "AllUserList"), where("Acc", "==", user.email));
        const snapshot = await getDocs(q);

        let currentAID = "";

        if (snapshot.empty) {
            const now = new Date();
            const newUser = {
                Year: now.getFullYear().toString(),
                Month: (now.getMonth() + 1).toString().padStart(2, '0'),
                AID: `A-${user.uid.substring(0, 7)}`,
                GID: "",
                Name: user.displayName || "No Name",
                Acc: user.email,
                Time: now.toISOString().substring(0, 10),
                Role: "Viewer",
                createdAt: now
            };
            await addDoc(collection(db, "AllUserList"), newUser);
            currentAID = newUser.AID;
            statusDiv.innerText = `အကောင့်အသစ် ထည့်ပြီးပြီ: ${currentAID}`;
        } else {
            currentAID = snapshot.docs[0].data().AID;
            statusDiv.innerText = `ပြန်လည်ကြိုဆိုပါတယ်: ${currentAID}`;
        }

        localStorage.setItem('AID', currentAID);

    } else {
        localStorage.removeItem('AID');
        statusDiv.innerText = "";
        loginBtn.innerText = "Google နဲ့ဝင်မယ်";
        loginBtn.onclick = () => signInWithRedirect(auth, provider);
    }
});
</script>

</body>
</html>

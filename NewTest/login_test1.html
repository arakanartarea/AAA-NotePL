<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login + User List</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .wrap { max-width: 600px; margin: 0 auto; }
        .profile { text-align: center; margin-bottom: 30px; }
        #profile-btn { width: 72px; height: 72px; border-radius: 50%; border: 3px solid #4285f4; cursor: pointer; background: #fff; padding: 0; overflow: hidden; }
        #profile-btn img { width: 100%; height: 100%; object-fit: cover; }
        #info { margin-top: 16px; text-align: center; color: #444; font-size: 14px; }
        .list-box { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .list-box h3 { margin: 0 0 12px 0; font-size: 16px; }
        .user-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .user-item:last-child { border-bottom: none; }
        .user-item img { width: 36px; height: 36px; border-radius: 50%; }
        .user-item .name { font-weight: 600; font-size: 14px; }
        .user-item .email { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="profile">
            <button id="profile-btn">
                <img id="profile-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="profile">
            </button>
            <div id="info">စစ်နေပါတယ်...</div>
        </div>

        <div class="list-box">
            <h3>Login ဝင်ထားသူများစာရင်း</h3>
            <div id="user-list">Loading...</div>
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

// မင်းရဲ့ config အမှန်ထည့်ပါ
const firebaseConfig = {
    apiKey: "AIzaSyC7N9_TNTp_aThC_olEDyMcEo2pAhOFEGI",
    authDomain: "arakanese-dictionary.firebaseapp.com",
    projectId: "arakanese-dictionary",
    storageBucket: "arakanese-dictionary.firebasestorage.app",
    messagingSenderId: "955711906003",
    appId: "1:955711906003:web:6d9b60bd4cdaa8a8953426"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
provider.setCustomParameters({ prompt: 'select_account' });

const profileBtn = document.getElementById('profile-btn');
const profileImg = document.getElementById('profile-img');
const info = document.getElementById('info');
const userList = document.getElementById('user-list');
const defaultIcon = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

// 1. Redirect ကနေပြန်လာတာကို ဖမ်း
getRedirectResult(auth).then(async (result) => {
    if (result && result.user) {
        const user = result.user;
        const q = query(collection(db, "AllUserList"), where("Acc", "==", user.email));
        const snap = await getDocs(q);
        if (snap.empty) {
            const now = new Date();
            const newAID = `A-${user.uid.slice(0,7)}`;
            await addDoc(collection(db, "AllUserList"), {
                Year: now.getFullYear()+"", 
                Month: ("0"+(now.getMonth()+1)).slice(-2),
                AID: newAID, 
                GID: "", 
                Name: user.displayName, 
                Acc: user.email,
                Photo: user.photoURL,
                Time: now.toISOString().slice(0,10), 
                Role: "Viewer", 
                createdAt: now
            });
        }
    }
}).catch(e => console.log('Redirect err:', e));

// 2. Login အခြေအနေနားထောင်
onAuthStateChanged(auth, (user) => {
    if (user) {
        profileImg.src = user.photoURL || defaultIcon;
        info.innerText = user.displayName;
    } else {
        profileImg.src = defaultIcon;
        info.innerText = "နှိပ်ပြီး Login ဝင်ပါ";
    }
});

// 3. Login ဝင်ပြီးသူစာရင်းကို Realtime ဆွဲပြ
onSnapshot(collection(db, "AllUserList"), (snapshot) => {
    userList.innerHTML = "";
    if (snapshot.empty) {
        userList.innerHTML = "ဘယ်သူမှမဝင်ရသေးပါ";
        return;
    }
    snapshot.forEach((doc) => {
        const d = doc.data();
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerHTML = `
            <img src="${d.Photo || defaultIcon}" alt="">
            <div>
                <div class="name">${d.Name || 'Unknown'}</div>
                <div class="email">${d.Acc}</div>
            </div>
        `;
        userList.appendChild(div);
    });
});

// 4. ခလုတ်နှိပ်ရင် Login ဝင်
profileBtn.onclick = () => {
    if (!auth.currentUser) {
        signInWithRedirect(auth, provider);
    }
};
</script>
</body>
</html>

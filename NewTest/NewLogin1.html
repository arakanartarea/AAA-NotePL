<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Rating System</title>
    <script src="https://accounts.google.com/gsi/client" onload="initGoogle()" async defer></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding-top: 50px; }
        .user-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px; width: 300px; }
        #userImg { width: 80px; height: 80px; border-radius: 50%; cursor: pointer; border: 3px solid #4285F4; }
        
        .vote-section { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        .num-pad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .num-btn { padding: 15px; font-size: 18px; border: none; background: #4285F4; color: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .num-btn:hover { background: #3367d6; }
        .num-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="user-card">
    <img id="userImg" src="https://cdn-icons-png.flaticon.com/512/295/295128.png">
    <h3 id="userName">Guest</h3>
    <p id="userEmail" style="font-size: 12px; color: gray;">Login to Vote</p>
</div>

<div class="vote-section">
    <h4>Rate this Song (0-9)</h4>
    <div class="num-pad" id="numPad">
        <!-- Buttons 0-9 generated by JS -->
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXPWKdMYzro7Dq0O3PFdxBCa5vGxijLDWCl8R7ZO0ODR3hCcveDossOAHjWErySw2B/exec"; // သင့် Apps Script URL ထည့်ပါ
    const CLIENT_ID = "750089996822-76hj5pfvrf8ui70eu6cimv0lb9lg6su3.apps.googleusercontent.com";

    function initGoogle() {
        google.accounts.id.initialize({ client_id: CLIENT_ID, callback: handleCredentialResponse });
        createButtons();
        updateUI();
    }

    function createButtons() {
        const pad = document.getElementById('numPad');
        for (let i = 0; i <= 9; i++) {
            let btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.innerText = i;
            btn.onclick = () => castVote(i);
            pad.appendChild(btn);
        }
    }

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        const userData = { name: payload.name, email: payload.email, picture: payload.picture, target: 'USER_REG' };
        
        localStorage.setItem('user_session', JSON.stringify(userData));
        updateUI();
        
        // User စာရင်းမှတ်ရန် ပို့ခြင်း
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(userData) });
    }

    function castVote(num) {
        const session = JSON.parse(localStorage.getItem('user_session'));
        if (!session) return alert("Please login first!");

        const voteData = {
            email: session.email,
            voteNumber: num,
            reason: "User Vote",
            target: 'VOTE_ACTION'
        };

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(voteData) })
        .then(() => alert("Voted " + num + " Successfully!"));
    }

    function updateUI() {
        const data = JSON.parse(localStorage.getItem('user_session'));
        const btns = document.querySelectorAll('.num-btn');
        
        if (data) {
            document.getElementById('userImg').src = data.picture;
            document.getElementById('userName').innerText = data.name;
            document.getElementById('userEmail').innerText = data.email;
            btns.forEach(b => b.disabled = false);
        } else {
            document.getElementById('userImg').src = "https://cdn-icons-png.flaticon.com/512/295/295128.png";
            btns.forEach(b => b.disabled = true);
        }
    }

    document.getElementById('userImg').onclick = () => {
        if (!localStorage.getItem('user_session')) google.accounts.id.prompt();
        else if (confirm("Logout?")) { localStorage.removeItem('user_session'); updateUI(); }
    };

    window.addEventListener('storage', (e) => { if (e.key === 'user_session') updateUI(); });
</script>

</body>
</html>
